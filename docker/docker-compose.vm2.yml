# docker-compose.vm2.yml — VM2 (10.0.1.6): Cassandra node 1 + CockroachDB node 1

name: twitch-node-1

services:
  cassandra:
    image: cassandra:4.1
    container_name: tbd-cass-1
    network_mode: host
    environment:
      CASSANDRA_CLUSTER_NAME: twitch-distributed
      CASSANDRA_SEEDS: "10.0.1.6,10.0.1.5"
      CASSANDRA_LISTEN_ADDRESS: "10.0.1.6"
      CASSANDRA_BROADCAST_ADDRESS: "10.0.1.6"
      CASSANDRA_RPC_ADDRESS: "0.0.0.0"
      CASSANDRA_BROADCAST_RPC_ADDRESS: "10.0.1.6"
      MAX_HEAP_SIZE: "4G"
      HEAP_NEWSIZE: "512M"
    volumes:
      - cass1_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh 10.0.1.6 9042 -e 'describe cluster' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 40

  cockroach:
    image: cockroachdb/cockroach:v23.2.5
    container_name: tbd-crdb-1
    network_mode: host
    command: >
      start --insecure
      --join=10.0.1.6:26257,10.0.1.5:26257,10.0.1.8:26257
      --advertise-addr=10.0.1.6:26257
      --listen-addr=0.0.0.0:26257
      --http-addr=0.0.0.0:8080
      --cache=2GiB
      --max-sql-memory=2GiB
      --store=/cockroach/cockroach-data
    volumes:
      - crdb1_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--host=10.0.1.6:26257", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  cass1_data:
  crdb1_data:
